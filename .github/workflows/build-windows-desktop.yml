name: Build Windows Desktop App

# Déclenchement :
# - manuel (bouton "Run workflow" dans l'onglet Actions de GitHub) ;
# - automatique sur un tag "vX.Y.Z" poussé sur le repo, pratique pour
#   publier une version numérotée sans y penser.
#
# Mode "toujours en ligne" (desktop/electron/main.js charge directement
# l'URL Railway) : plus besoin de compiler un backend Python embarqué ni
# de copier le frontend statique, contrairement à la version précédente
# de ce workflow — juste Electron + electron-builder.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances Electron
        working-directory: desktop
        run: npm install

      - name: Construire l'installeur Windows
        working-directory: desktop
        run: npm run dist:win

      - name: Publier l'installeur comme artefact du build
        uses: actions/upload-artifact@v4
        with:
          name: CrimTrack-installer-windows
          path: desktop/dist/*.exe

      - name: Publier une Release GitHub (si le build vient d'un tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
